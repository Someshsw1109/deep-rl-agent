kind = "web"
previewPath = "/"
title = "Deep RL Agent"
version = "1.0.0"
id = "artifacts/rl-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25042

[services.development]
run = "pnpm --filter @workspace/rl-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rl-agent", "run", "build" ]
publicDir = "artifacts/rl-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25042"
BASE_PATH = "/"
